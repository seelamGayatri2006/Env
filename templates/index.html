<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Environmental Monitor - Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f5f5f8; }
    .card { background: white; padding: 18px; border-radius: 8px; max-width:700px; margin:auto; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    label { display:block; margin-top:10px; font-weight:600; }
    input { width:100%; padding:8px; margin-top:6px; border:1px solid #ddd; border-radius:4px; }
    button { margin-top:14px; padding:10px 14px; border:none; background:#2f8be6; color:white; border-radius:6px; cursor:pointer; }
    .result { margin-top:16px; padding:12px; border-radius:6px; background:#f1f6ff; }
    .badge { display:inline-block; padding:6px 8px; border-radius:6px; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Environmental Monitoring — Pollution Prediction</h2>
    <p>Enter sensor readings and get predicted air quality category plus suggestions.</p>

    <label>PM2.5 (µg/m³)</label>
    <input id="pm25" type="number" step="0.1" value="55" />

    <label>PM10 (µg/m³)</label>
    <input id="pm10" type="number" step="0.1" value="80" />

    <label>NO2 (µg/m³)</label>
    <input id="no2" type="number" step="0.1" value="30" />

    <label>SO2 (µg/m³)</label>
    <input id="so2" type="number" step="0.1" value="8" />

    <label>CO (mg/m³)</label>
    <input id="co" type="number" step="0.01" value="0.7" />

    <label>Temperature (°C)</label>
    <input id="temp" type="number" step="0.1" value="25" />

    <label>Humidity (%)</label>
    <input id="hum" type="number" step="0.1" value="60" />

    <button onclick="send()">Predict</button>

    <div id="out" class="result" style="display:none;"></div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
